# 知识库文档「口语症状摘要」旁路表（chunk 整形用）
#
# 背景：用户提问多为口语症状（"配置改不动""页面卡"），而 SOP/复盘正文是技术术语
# （configsdk disconnect、ctx canceled）。reranker（cross-encoder）对「口语 query ↔
# 技术正文」这类不对称 pair 打分偏低，导致正确文档被阈值砍掉、cite 命中率波动。
#
# 解法（chunk 整形）：给每篇文档配一段「用户会怎么口语描述这个故障」，由 chunker 前置到
# 该文档每个 chunk 的 content，桥接 query↔doc 文体鸿沟，把 reranker 分数拉过阈值。
#
# 维护约定：
# - key = doc_id（文件名去扩展），value = 一段口语症状描述
# - 写"用户/运营/排障同学会怎么说"，不要逐字照抄评测 query（避免过拟合到测试集）
# - 覆盖该故障的高频口语面即可，缺失的 doc_id 不整形（向后兼容，不影响检索）
#
# 覆盖范围：F1-F10 共 10 个故障的 sop+pm = 20 篇（首轮 W8.6 先做 F2/F5/F8/F10 共 8 篇，
#   2026-06-30 补全 F1/F3/F4/F6/F7/F9 共 12 篇）。
# 不整形：pm-011（分布式锁）、pm-012（ctx吞没）——评测集无对应 expected case，
#   给它们加症状只会徒增噪声文档、可能顶替正确文档，故留空。

# ---- F2：下游 HTTP 调用错误（200 但业务失败 / 静默故障）----
sop-f2-downstream-http-error: >-
  调外部服务/下游接口出错，接口返回 200 但业务实际没成功；功能悄悄坏了一段时间也没告警、
  没有 5xx；用户投诉某功能不正常、提交成功但没生效、审核没通过。
pm-002-downstream-http-404: >-
  下游服务返回 404/非预期状态码导致业务静默失败；队列任务一直不动但服务没挂；
  注册或审核显示成功实际没通过；没有报错没有告警，问题被拖了很久才发现。

# ---- F5：数据库慢查询与超时（ctx canceled / 慢 SQL）----
sop-f5-sql-ctx-canceled: >-
  数据库查询很慢甚至超时，列表页/报表页加载很久最后打不开；接口 P99 飙高到几十秒；
  连接池快满、Threads_connected 持续上涨；早高峰/业务高峰变卡、低峰期正常。
pm-005-slow-sql-join-explosion: >-
  数据量增长后某个列表/统计查询突然变得极慢，以前一直正常；多表关联查询拖垮数据库；
  高峰期系统卡顿、查询排队、连接堆积。

# ---- F8：配置中心 SDK 断连（配置热更新失效）----
sop-f8-configsdk-disconnect: >-
  配置改了不生效、配置热更新失效，服务自身完全正常、没有任何报错也没挂；
  日志出现 reconnecting 重连、退避时间越来越长（4s/8s/16s）；运营改了限流/路由配置但不生效。
pm-008-configsdk-reconnect-bug: >-
  配置中心做了滚动升级后，配置推送不工作了、客户端断连后没能正确重连；
  改了配置迟迟不下发，但服务运行正常无报错。

# ---- F10：token 解码错误（鉴权静默失败 / 密钥轮换）----
sop-f10-token-decode-error: >-
  用户登录后操作一直提示未授权，重新登录也没用；token 解码/校验报错；
  鉴权失败被记成 INFO 级别所以没触发告警；静默故障拖了很久才被用户反馈发现。
pm-010-token-key-rotation-silent-failure: >-
  做完密钥轮换后部分用户鉴权不通过，但完全没有告警；新旧密钥不匹配导致 token 校验失败；
  一部分人能用一部分人不能用，问题静默没被监控发现。

# ---- F1：级联超时（全链路雪崩 / 转圈失败）----
sop-f1-cascade-timeout: >-
  操作提交后一直转圈、最后提示失败；多个服务同时变慢/同时告警、接口 P99 突增；
  某个功能整条链路不可用但其他功能正常；下游一慢上游跟着超时。
pm-001-cascade-timeout: >-
  某个核心服务变慢，拖垮了整条调用链，网关大量 504、功能全线不可用；
  一个慢服务引发级联雪崩，多个服务接连超时告警。

# ---- F3：Kafka 事件异常（消息堆积 / 操作没反应）----
sop-f3-kafka-error: >-
  操作提交后没反应、审核结果迟迟不出；消息队列堆积、消费滞后越来越多；
  事件发不出去或消费不动，功能像是卡住了但服务没挂。
pm-003-kafka-broker-disk-full: >-
  消息队列消费滞后持续增长、事件延迟甚至丢失，审核任务大量堆积；
  下游迟迟收不到状态变更，凌晨开始悄悄积压。

# ---- F4：对象存储上传被取消（大文件上传失败）----
sop-f4-object-storage-canceled: >-
  文件上传到一半就失败、固件升级包传不上去；大文件上传失败但小文件正常；
  上传传输中途被打断，没有明显告警。
pm-004-object-storage-ctx-canceled: >-
  大文件（如固件包）上传全部失败、小文件正常；上传被网关超时掐断；
  没有对应告警，靠用户反馈才发现的静默故障。

# ---- F6：DNS 解析故障（找不到下游 / 间歇性调用失败）----
sop-f6-dns-lookup-failed: >-
  服务间调用间歇性报错 unknown host / connection refused；下游自身指标正常却连不上（找不到下游）；
  解析超时导致大量调用失败，像网络抖动。
pm-006-coredns-overload: >-
  集群里所有服务间调用大面积间歇失败、502/503 突增；解析服务过载导致到处 unknown host；
  下游都活着但就是连不上，影响面很广。

# ---- F7：MySQL 业务错误（提交报错 / 保存失败）----
sop-f7-mysql-business-error: >-
  提交报错、数据保存失败、导入功能报错；特定操作失败率高但数据库本身指标正常（不是 DB 挂了）；
  唯一键冲突/字段缺省/SQL 语法这类业务层报错。
pm-007-duplicate-key-import: >-
  批量导入失败、个别记录注册失败，并发导入撞唯一键冲突；
  操作耗时突增，数据库没挂但特定写入报错。

# ---- F9：空指针 panic（突然 500 刷新又好）----
sop-f9-panic-nil-pointer: >-
  突然报 500、刷新一下又好了；服务 500 率突增但进程没挂（被 recover 兜住）；
  某个查询/接口偶发崩，像是遇到空数据就出错。
pm-009-nil-pointer-new-device: >-
  某接口 500 率突然从 0 飙到几个点、其他接口正常；数据库返回空结果没判空触发崩溃；
  新数据/边界场景下偶发 panic，持续时间很短。
